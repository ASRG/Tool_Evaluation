name: Build & Deploy to WordPress

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build Frontend & FTP Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: asrg-csms-evaluation/frontend/package-lock.json

      - name: Install dependencies
        working-directory: asrg-csms-evaluation/frontend
        run: npm ci

      - name: Build frontend
        working-directory: asrg-csms-evaluation/frontend
        run: npm run build

      - name: Deploy to WordPress via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./asrg-csms-evaluation/
          server-dir: ${{ secrets.FTP_REMOTE_PATH }}
          exclude: |
            frontend/node_modules/**
            frontend/src/**
            frontend/index.html
            frontend/package.json
            frontend/package-lock.json
            frontend/vite.config.ts
            frontend/tsconfig.json
            frontend/tsconfig.tsbuildinfo
            frontend/tailwind.config.ts
            frontend/postcss.config.js
